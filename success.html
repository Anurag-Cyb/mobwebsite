<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Sent</title>

<style>

body{
    background:#0b0b0f;
    font-family:Arial, Helvetica, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.success-box{
    background:#121218;
    border:1px solid #2a2a35;
    padding:40px 50px;
    border-radius:12px;
    text-align:center;
    max-width:420px;
    box-shadow:0 0 40px rgba(124,58,237,0.2);
}

.success-icon{
    font-size:50px;
    color:#7c3aed;
    margin-bottom:15px;
}

.success-title{
    font-size:22px;
    color:white;
    font-weight:bold;
    margin-bottom:10px;
}

.success-text{
    color:#b3b3c6;
    font-size:15px;
    line-height:1.6;
}

.home-btn{
    margin-top:25px;
    display:inline-block;
    padding:12px 25px;
    background:#7c3aed;
    color:white;
    text-decoration:none;
    border-radius:6px;
    font-size:14px;
    transition:0.3s;
}

.home-btn:hover{
    background:#6d28d9;
}

</style>

<style>
/* ===== Mobile Responsiveness Patch ===== */
body{overflow-x:hidden;}
img{max-width:100%;height:auto;}

/* Header adjustments */
.logo img{
height:60px;
max-width:100%;
}

@media (max-width:600px){
.logo img{height:50px;}
nav.open a{font-size:1.2rem;}
header{padding:12px 18px !important;}
}

/* Generic section padding */
@media (max-width:768px){
section,
.page-hero,
.cert-section,
.other-section{
padding-left:20px !important;
padding-right:20px !important;
}
}

/* Services page fix */
@media (max-width:768px){
.services-wrapper{
grid-template-columns:1fr !important;
}
.svc-list{
max-height:260px !important;
}
}

/* Training cards responsive */
.courses-grid{
grid-template-columns:repeat(auto-fit,minmax(260px,1fr)) !important;
}

/* Register layout improvements */
@media (max-width:768px){
.reg-layout{
grid-template-columns:1fr !important;
gap:28px !important;
}

.reg-form-card{
padding:28px 22px !important;
}

.form-row{
grid-template-columns:1fr !important;
}
}
</style>

</head>

<body>

<div class="success-box">

<div class="success-icon">✔</div>

<div class="success-title">
Success!
</div>

<div class="success-text">
Your message has been sent successfully.<br>
Our team will respond within <b>1–2 business days.</b>
</div>

<a href="index.html" class="home-btn">
Return to Home
</a>

</div>

</body>
</html>
